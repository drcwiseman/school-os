# FIRST server block only — replace the masomobest.com / www block in
# /etc/nginx/conf.d/vhosts/masomobest.com.conf
# Keep webmail / mail / cpanel server blocks below unchanged.

server {
	listen 173.231.241.161:80;
	server_name masomobest.com  www.masomobest.com;

	access_log /usr/local/apache/domlogs/masomobest.com.bytes bytes;
	access_log /usr/local/apache/domlogs/masomobest.com.log combined;
	error_log /usr/local/apache/domlogs/masomobest.com.error.log error;

	location / {
		proxy_pass http://127.0.0.1:5000;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
	}

	location ~ /\.ht    {deny all;}
	location ~ /\.svn/  {deny all;}
	location ~ /\.git/  {deny all;}
	location ~ /\.hg/   {deny all;}
	location ~ /\.bzr/  {deny all;}

	disable_symlinks if_not_owner from=/home/bishopcl/public_html;

	location /.well-known/acme-challenge {
		default_type "text/plain";
		alias /usr/local/apache/autossl_tmp/.well-known/acme-challenge;
	}

	location /.well-known/pki-validation {
		default_type "text/plain";
		alias /usr/local/apache/autossl_tmp/.well-known/acme-challenge;
	}
}
